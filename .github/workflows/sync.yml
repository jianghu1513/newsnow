name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork
        uses: tgymnich/fork-sync@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repository: ourongxing/newsnow
          target_branch: main
